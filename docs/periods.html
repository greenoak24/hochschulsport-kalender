<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hochschulsport Kalender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Sans+Condensed:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=2" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="layout">
      <header class="hero">
        <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 16px;">
          <a href="index.html" class="btn btn-ghost">Normaler Kalender</a>
          <a href="periods.html" class="btn btn-primary">Zeiträume</a>
        </div>
        <p class="eyebrow">RWTH Hochschulsport</p>
        <h1>Perioden-Kalender</h1>
        <p class="subline">Kursübersicht für den 1. und 2. Zeitraum pro Wochentag.</p>
      </header>

      <section class="calendar-shell">
        <div class="calendar-toolbar">
          <div class="nav-group" id="dayNavGroup" style="display:none;">
            <button id="prevDay" class="btn" type="button">&larr; Vor</button>
            <button id="nextDay" class="btn" type="button">Weiter &rarr;</button>
          </div>
          <h2 id="monthLabel" class="month-label"></h2>
        </div>

        <div class="calendar-controls">
          <div class="view-group" id="periodGroup">
            <button class="btn btn-ghost period-btn active" data-period="1" type="button">1. Zeitraum</button>
            <button class="btn btn-ghost period-btn" data-period="2" type="button">2. Zeitraum</button>
          </div>
          <div class="view-group" id="viewGroup">
            <button class="btn btn-ghost view-btn active" data-view="week" type="button">Woche</button>
            <button class="btn btn-ghost view-btn" data-view="day" type="button">Tag</button>
          </div>

          <div class="filter-group">
            <label for="sportSearch">Sportarten</label>
            <div class="sport-search-wrap">
              <input id="sportSearch" type="search" placeholder="Sportart suchen..." autocomplete="off" />
              <div id="sportSuggestionBox" class="suggestion-box"></div>
            </div>
            <button id="clearSportFilter" class="btn btn-ghost" type="button">Alle</button>
            <div class="selected-sports" id="selectedSports"></div>
          </div>

          <div class="toggle-filters">
            <label><input type="radio" name="semester" id="periodSommer" checked /> Sommersemester</label>
            <label><input type="radio" name="semester" id="periodAktuell" /> Wintersemester</label>
          </div>

          <div class="toggle-filters">
            <label><input type="checkbox" id="bookableOnly" /> Nur buchbare</label>
            <label><input type="checkbox" id="singleOnly" /> Nur Einzeltermine</label>
            <label><input type="checkbox" id="freeOnly" /> Nur gratis</label>
          </div>

          <div class="level-filter" id="levelFilterContainer"></div>
        </div>

        <div class="event-legend" aria-label="Legende">
          <span class="legend-title">Legende</span>
          <span class="legend-item">
            <span class="legend-dot single"></span>
            Einzeltermin
          </span>
          <span class="legend-item">
            <span class="legend-dot recurring"></span>
            Serientermin
          </span>
        </div>

        <div class="weekday-row" id="weekdayRow"></div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>

      <aside class="detail-panel">
        <h3 id="detailHeadline">Termine</h3>
        <p id="detailDate" class="detail-date"></p>
        <ul id="detailList" class="detail-list"></ul>
      </aside>
    </main>

    <script type="module" src="periods.js?v=2"></script>
  </body>
</html>
